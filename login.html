<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MECEE-BL — Login</title>
<link rel="icon" type="image/x-icon" href="Assets/Favicon/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="Assets/Favicon/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="Assets/Favicon/favicon-16x16.png" />
<style>
  :root {
    --bg: #ffffff;
    --surface: #f6f6f6;
    --surface-2: #ececec;
    --text: #111111;
    --muted: #6b6b6b;
    --border: #dcdcdc;
    --accent: #111111;
    --accent-text: #ffffff;
    --error: #c0392b;
    --error-bg: #fdf0ef;
  }
  [data-theme="dark"] {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface-2: #232323;
    --text: #f5f5f5;
    --muted: #999;
    --border: #2a2a2a;
    --accent: #f5f5f5;
    --accent-text: #0e0e0e;
    --error: #e74c3c;
    --error-bg: #2a1515;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Soft off-centre glows behind the card — same --bg underneath, just
     two faint radial washes so the page doesn't feel like a flat empty
     rectangle. Pure CSS, no images, no extra DOM weight. */
  body::before,
  body::after {
    content: "";
    position: fixed;
    width: 60vmax;
    height: 60vmax;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.16;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    top: -22vmax;
    left: -18vmax;
    background: var(--accent);
  }
  body::after {
    bottom: -26vmax;
    right: -20vmax;
    background: var(--accent);
    opacity: 0.10;
  }

  @keyframes loginRise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    position: relative;
    z-index: 1;
    animation: loginRise 0.5s cubic-bezier(.22,.61,.16,1) both;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 38px 32px 32px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  /* Slim accent bar across the top edge — the one spot of colour on an
     otherwise neutral card, gives it a "product" feel rather than a
     generic form. */
  .login-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      transparent,
      var(--accent),
      transparent);
    opacity: 0.7;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 30px;
  }
  .login-logo-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    line-height: 1;
    border-radius: 16px;
    background: color-mix(in srgb, var(--accent) 12%, var(--surface-2));
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
  }
  .login-logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .login-logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .login-field {
    margin-bottom: 16px;
  }
  .login-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  /* Wrapper anchors the leading icon (and, for password, the trailing
     show/hide toggle) to the input row without disturbing its layout. */
  .login-input-row {
    position: relative;
    display: flex;
    align-items: center;
  }
  .login-input-row .field-icon {
    position: absolute;
    left: 14px;
    font-size: 15px;
    opacity: 0.4;
    pointer-events: none;
    line-height: 1;
  }
  .login-field input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .login-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
  }
  .login-toggle-pass {
    position: absolute;
    right: 6px;
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .login-toggle-pass:hover {
    background: var(--surface);
    color: var(--text);
  }
  /* Sits on the white password field now — keep it in dark neutrals so
     it reads clearly regardless of the active theme's own colours. */
  #togglePass {
    color: #8a8a8a;
  }
  #togglePass:hover {
    background: #ececec;
    color: #161616;
  }
  /* Chrome/Edge/Safari force their own background + text colour on
     autofilled fields via `:-webkit-autofill` (a pale yellow/white box
     with black text, `!important`-ed in the UA stylesheet) — it ignores
     page CSS entirely and looks jarring against every theme but Light.
     The only override that actually works is painting a huge inset
     box-shadow in the theme's surface colour over the UA background
     (background-color itself can't win against `!important`), combined
     with `-webkit-text-fill-color` to recolour the text. The absurdly
     long transition delay prevents the UA's yellow from flashing before
     our override applies on autofill. This re-applies automatically on
     every theme switch because it all reads CSS variables. */
  .login-field input:-webkit-autofill,
  .login-field input:-webkit-autofill:hover,
  .login-field input:-webkit-autofill:focus,
  .login-field input:-webkit-autofill:active {
    -webkit-text-fill-color: var(--text);
    caret-color: var(--text);
    -webkit-box-shadow: 0 0 0 1000px var(--surface-2) inset;
    box-shadow: 0 0 0 1000px var(--surface-2) inset;
    transition: background-color 9999s ease-in-out 0s, -webkit-text-fill-color 9999s ease-in-out 0s;
  }
  .login-field input::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  /* Password field gets a plain white background with dark text — a
     deliberate departure from the themed surface colour, requested so
     it stands out as the field you're typing into. Override its
     placeholder, focus ring, and the autofill UA-style fight too, so
     all three states stay consistent with the white fill. */
  #password {
    background: #ffffff;
    color: #161616;
  }
  #password::placeholder {
    color: #8a8a8a;
    opacity: 1;
  }
  #password:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  #password:-webkit-autofill,
  #password:-webkit-autofill:hover,
  #password:-webkit-autofill:focus,
  #password:-webkit-autofill:active {
    -webkit-text-fill-color: #161616;
    caret-color: #161616;
    -webkit-box-shadow: 0 0 0 1000px #ffffff inset;
    box-shadow: 0 0 0 1000px #ffffff inset;
    transition: background-color 9999s ease-in-out 0s, -webkit-text-fill-color 9999s ease-in-out 0s;
  }

  .login-remember {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 22px;
    cursor: pointer;
    user-select: none;
    width: fit-content;
  }
  .login-remember input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .login-remember span {
    font-size: 13px;
    color: var(--muted);
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 28%, transparent);
  }
  .login-btn:hover  { opacity: 0.92; transform: translateY(-1px); }
  .login-btn:active { opacity: 0.8; transform: translateY(0); }
  .login-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .login-footer {
    text-align: center;
    margin-top: 22px;
    font-size: 11.5px;
    color: var(--muted);
    opacity: 0.7;
    letter-spacing: 0.2px;
  }

  .login-error {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--error-bg);
    border: 1px solid var(--error);
    border-radius: 8px;
    font-size: 13px;
    color: var(--error);
  }
  .login-error.show { display: block; }

  /* shake animation on wrong password */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  .login-card.shake { animation: shake 0.35s ease; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card" id="loginCard">
    <div class="login-logo">
      <span class="login-logo-icon">📚</span>
      <h1>MECEE-BL 2027</h1>
      <p>Sign in to continue</p>
    </div>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="login-field">
        <label for="username">Username</label>
        <div class="login-input-row">
          <span class="field-icon" aria-hidden="true">👤</span>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            autocomplete="username"
            spellcheck="false"
            autofocus
          />
        </div>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <div class="login-input-row">
          <span class="field-icon" aria-hidden="true">🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
          />
          <button type="button" class="login-toggle-pass" id="togglePass" title="Show password" aria-label="Show password">👁</button>
        </div>
      </div>

      <label class="login-remember">
        <input type="checkbox" id="rememberMe" />
        <span>Remember me</span>
      </label>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>

      <div class="login-error" id="loginError">Incorrect username or password.</div>
    </form>

    <p class="login-footer">MECEE-BL · Personal study tracker</p>
  </div>
</div>

<script>
  /* Apply saved theme */
  const savedTheme = localStorage.getItem('mecee_theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

  /* Credentials (client-side gate for a local personal app) */
  const VALID_USER = 'sameer';
  const VALID_PASS = 'SameerPun123';
  const AUTH_KEY   = 'mecee_auth';
  const DEST       = 'index.html';

  /* If already logged in, go straight to the app */
  if (sessionStorage.getItem(AUTH_KEY) === '1' || localStorage.getItem(AUTH_KEY) === '1') {
    location.replace(DEST);
  }

  const form       = document.getElementById('loginForm');
  const userInput  = document.getElementById('username');
  const passInput  = document.getElementById('password');
  const remember   = document.getElementById('rememberMe');
  const btn        = document.getElementById('loginBtn');
  const errorBox   = document.getElementById('loginError');
  const card       = document.getElementById('loginCard');
  const togglePass = document.getElementById('togglePass');

  togglePass.addEventListener('click', () => {
    const showing = passInput.type === 'text';
    passInput.type = showing ? 'password' : 'text';
    togglePass.textContent = showing ? '👁' : '🙈';
    togglePass.title = showing ? 'Show password' : 'Hide password';
    togglePass.setAttribute('aria-label', togglePass.title);
    passInput.focus();
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const user = userInput.value.trim();
    const pass = passInput.value;

    if (user === VALID_USER && pass === VALID_PASS) {
      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      if (remember.checked) {
        localStorage.setItem(AUTH_KEY, '1');
      } else {
        sessionStorage.setItem(AUTH_KEY, '1');
      }
      location.replace(DEST);
    } else {
      errorBox.classList.add('show');
      passInput.value = '';
      passInput.focus();
      /* Shake the card */
      card.classList.remove('shake');
      void card.offsetWidth; /* reflow to restart animation */
      card.classList.add('shake');
      card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    }
  });
</script>
</body>
</html>
